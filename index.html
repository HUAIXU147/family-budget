<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>生活费统计表</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            background: #eef2f9;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
        }

        /* 头部 */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
            border-bottom: 2px solid #e9edf2;
            padding-bottom: 20px;
        }

        .budget-section {
            display: flex;
            align-items: baseline;
            gap: 12px;
            background: #f1f5f9;
            padding: 8px 24px;
            border-radius: 60px;
        }

        .budget-section label {
            font-weight: 700;
            color: #1e293b;
        }

        .budget-input {
            font-size: 1.3rem;
            font-weight: 700;
            width: 130px;
            padding: 6px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            text-align: center;
            background: white;
        }

        .budget-input:focus {
            outline: none;
            border-color: #2c7a4d;
            box-shadow: 0 0 0 3px rgba(44,122,77,0.2);
        }

        .month-control {
            display: flex;
            align-items: center;
            gap: 18px;
            background: #ffffff;
            padding: 5px 20px;
            border-radius: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .month-btn {
            background: #eef2ff;
            border: none;
            font-size: 1.6rem;
            font-weight: 600;
            width: 42px;
            height: 42px;
            border-radius: 42px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .month-btn:hover {
            background: #d9e2ef;
            transform: scale(0.96);
        }

        .current-month {
            font-size: 1.5rem;
            font-weight: 700;
            min-width: 200px;
            text-align: center;
            letter-spacing: 1px;
            color: #0f172a;
        }

        /* 统计卡片 */
        .stats {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            margin-bottom: 28px;
            background: linear-gradient(120deg, #f8fafc 0%, #ffffff 100%);
            padding: 18px 24px;
            border-radius: 28px;
        }

        .stat-card {
            flex: 1;
            background: white;
            border-radius: 24px;
            padding: 12px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #eef2f6;
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5b6e8c;
            font-weight: 500;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: #1e293b;
            line-height: 1.2;
        }

        .remaining {
            color: #2c7a4d;
        }
        .remaining.negative {
            color: #c2412c;
        }
        .progress-bar-bg {
            margin-top: 10px;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #2c7a4d;
            border-radius: 10px;
            transition: width 0.2s;
        }

        /* 表格区域 - 无横向滚动，自适应宽度 */
        .table-wrapper {
            overflow-x: visible;
            border-radius: 24px;
            border: 1px solid #edf2f7;
            background: white;
            position: relative;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            font-size: 0.9rem;
            color: #2c7a4d;
            backdrop-filter: blur(2px);
            border-radius: 24px;
        }

        .expense-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            table-layout: fixed;
        }

        .expense-table th {
            background: #f1f6fd;
            padding: 12px 4px;
            font-weight: 700;
            color: #1f3a4b;
            border-bottom: 1px solid #e2e8f0;
            text-align: center;
            width: 12.5%;
        }

        .expense-table td {
            border: 1px solid #ecf3f9;
            padding: 6px 3px;
            vertical-align: top;
            background: white;
        }

        /* 每日卡片 */
        .day-card {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }
        .day-header {
            font-weight: 700;
            font-size: 0.85rem;
            background: #eef2ff;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            margin: 0 auto 4px auto;
            color: #1f2937;
        }
        .expense-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 4px;
            max-height: 180px;
            overflow-y: auto;
        }
        .expense-item {
            display: flex;
            align-items: center;
            gap: 3px;
            background: #f9fafc;
            padding: 2px 4px;
            border-radius: 16px;
            border: 1px solid #e9edf2;
            flex-wrap: wrap;
        }
        .expense-name {
            flex: 2;
            min-width: 45px;
            padding: 4px 4px;
            border: 1px solid #cfdee9;
            border-radius: 16px;
            font-size: 0.7rem;
            background: white;
        }
        .expense-amount {
            width: 58px;
            padding: 4px 4px;
            border: 1px solid #cfdee9;
            border-radius: 16px;
            font-size: 0.7rem;
            text-align: center;
            background: white;
        }
        .delete-item-btn {
            background: #fee2e2;
            border: none;
            border-radius: 20px;
            width: 20px;
            height: 20px;
            font-size: 0.6rem;
            font-weight: bold;
            cursor: pointer;
            color: #b91c1c;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .delete-item-btn:hover {
            background: #fecaca;
        }
        .add-item-btn {
            background: #e6f0fa;
            border: none;
            border-radius: 30px;
            padding: 4px 6px;
            font-size: 0.65rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            color: #2c5f8a;
            margin-top: 2px;
        }
        .add-item-btn:hover {
            background: #d4e2f5;
        }
        /* 日总结样式 */
        .day-total {
            background: #f0fdf4;
            border-radius: 20px;
            padding: 4px 6px;
            font-size: 0.7rem;
            font-weight: 600;
            text-align: center;
            color: #15803d;
            border: 1px solid #bbf7d0;
            margin-top: 4px;
        }
        .empty-cell {
            background: #fafdff;
            opacity: 0.55;
            text-align: center;
            vertical-align: middle;
        }
        .week-total {
            background: #fef9e3;
            font-weight: 800;
            color: #b45309;
            text-align: center;
            vertical-align: middle;
            font-size: 0.85rem;
        }
        .week-total span {
            background: #fff1e6;
            padding: 4px 8px;
            border-radius: 30px;
            display: inline-block;
        }
        .footer-note {
            margin-top: 24px;
            text-align: center;
            font-size: 0.7rem;
            color: #5c6f87;
            border-top: 1px solid #ecf3f9;
            padding-top: 18px;
        }

        @media (max-width: 900px) {
            .expense-table {
                font-size: 0.7rem;
            }
            .expense-name {
                min-width: 38px;
                font-size: 0.65rem;
            }
            .expense-amount {
                width: 50px;
                font-size: 0.65rem;
            }
            .day-total {
                font-size: 0.65rem;
                padding: 3px 4px;
            }
        }

        @media (max-width: 700px) {
            .expense-name {
                min-width: 32px;
            }
            .expense-amount {
                width: 45px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="budget-section">
            <label>💰 月预算总额</label>
            <input type="number" id="totalBudgetInput" class="budget-input" step="100" value="4000">
        </div>
        <div class="month-control">
            <button id="prevMonthBtn" class="month-btn">◀</button>
            <div id="currentMonthDisplay" class="current-month">加载中...</div>
            <button id="nextMonthBtn" class="month-btn">▶</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">📆 本月总消费</div>
            <div class="stat-value" id="totalSpent">0.00</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">💎 剩余生活费</div>
            <div class="stat-value remaining" id="remainingAmount">4000.00</div>
            <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
        </div>
    </div>

    <div class="table-wrapper" id="tableWrapper">
        <div class="loading-overlay" id="loadingOverlay" style="display: none;">📡 加载数据中...</div>
        <table class="expense-table" id="expenseTable">
            <thead>
                <tr><th>周一</th><th>周二</th><th>周三</th><th>周四</th><th>周五</th><th>周六</th><th>周日</th><th>📊 周合计</th>   </>
            </thead>
            <tbody id="tableBody"></tbody>
         </table>
    </div>
    <div class="footer-note">
        ✨ 数据实时云端同步（Firebase），每月消费独立保存，切换月份不会丢失历史记录。<br>
        📝 每天可自由添加消费项（早餐、午餐、交通等），点击“+ 添加”增加条目，每日底部显示本日合计。
    </div>
</div>

<script>
    // ----------------------------- Firebase 配置（请替换为您的项目配置）-----------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyBv8bpOCY4A3mSR5c6W28NhZxa2c7GnVgM",
        authDomain: "family-budget-6195c.firebaseapp.com",
        projectId: "family-budget-6195c",
        storageBucket: "family-budget-6195c.firebasestorage.app",
        messagingSenderId: "1073000744379",
        appId: "1:1073000744379:web:f0151dec6b3564a470f09e"
    };
    let db = null;
    let firebaseInitialized = false;
    try {
        if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            firebaseInitialized = true;
            console.log("✅ Firebase 已连接，历史记录云端保存");
        } else {
            console.warn("⚠️ 未填写 Firebase 配置，数据将仅保存在内存中（刷新会丢失）");
        }
    } catch(e) {
        console.warn("Firebase 初始化失败", e);
    }

    // ---------- 全局变量 ----------
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    let totalBudget = 4000;
    let currentMonthUnsubscribe = null;
    let budgetUnsubscribe = null;
    let isRendering = false;

    function getDocId(year, month) {
        const m = (month + 1).toString().padStart(2, '0');
        return `${year}_${m}`;
    }
    const BUDGET_DOC_ID = "global_budget";

    function setLoading(show) {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) overlay.style.display = show ? 'flex' : 'none';
    }

    // 构建表格结构（骨架，包含日合计占位）
    function buildTableStructure() {
        const year = currentYear;
        const month = currentMonth;
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const firstDayJS = new Date(year, month, 1).getDay();
        let firstMondayOffset = (firstDayJS === 0 ? 6 : firstDayJS - 1);
        
        const weeks = [];
        let currentDay = 1;
        for (let row = 0; row < 6; row++) {
            const week = [];
            let hasDays = false;
            for (let col = 0; col < 7; col++) {
                if ((row === 0 && col < firstMondayOffset) || currentDay > daysInMonth) {
                    week.push({ day: null, valid: false });
                } else {
                    if (currentDay <= daysInMonth) {
                        week.push({ day: currentDay, valid: true });
                        hasDays = true;
                        currentDay++;
                    } else {
                        week.push({ day: null, valid: false });
                    }
                }
            }
            if (hasDays || week.some(c => c.day !== null)) weeks.push(week);
            if (currentDay > daysInMonth) break;
        }

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        for (let w = 0; w < weeks.length; w++) {
            const weekCells = weeks[w];
            const tr = document.createElement('tr');
            for (let i = 0; i < 7; i++) {
                const cellData = weekCells[i];
                const td = document.createElement('td');
                if (!cellData || !cellData.valid) {
                    td.className = 'empty-cell';
                    td.innerHTML = '<div style="padding: 12px 0; color:#a0b3cc;">—</div>';
                } else {
                    const dayNum = cellData.day;
                    const dayCard = document.createElement('div');
                    dayCard.className = 'day-card';
                    dayCard.setAttribute('data-day', dayNum);
                    
                    const dayHeader = document.createElement('div');
                    dayHeader.className = 'day-header';
                    dayHeader.innerText = dayNum;
                    dayCard.appendChild(dayHeader);
                    
                    const expenseListDiv = document.createElement('div');
                    expenseListDiv.className = 'expense-list';
                    expenseListDiv.id = `day-${dayNum}-list`;
                    dayCard.appendChild(expenseListDiv);
                    
                    const addBtn = document.createElement('button');
                    addBtn.className = 'add-item-btn';
                    addBtn.innerHTML = '+ 添加';
                    addBtn.onclick = (e) => {
                        e.stopPropagation();
                        addExpenseItem(dayNum);
                    };
                    dayCard.appendChild(addBtn);
                    
                    // 日总结显示区域
                    const dayTotalDiv = document.createElement('div');
                    dayTotalDiv.className = 'day-total';
                    dayTotalDiv.id = `day-total-${dayNum}`;
                    dayTotalDiv.innerText = '合计: 0.00';
                    dayCard.appendChild(dayTotalDiv);
                    
                    td.appendChild(dayCard);
                }
                tr.appendChild(td);
            }
            const weekTotalTd = document.createElement('td');
            weekTotalTd.className = 'week-total';
            weekTotalTd.innerHTML = `<span>0.00</span>`;
            tr.appendChild(weekTotalTd);
            tbody.appendChild(tr);
        }
    }

    function createExpenseItemElement(day, itemId, name = '', amount = '') {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'expense-item';
        itemDiv.setAttribute('data-item-id', itemId);
        
        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.className = 'expense-name';
        nameInput.placeholder = '项目';
        nameInput.value = name;
        
        const amountInput = document.createElement('input');
        amountInput.type = 'number';
        amountInput.step = '0.01';
        amountInput.className = 'expense-amount';
        amountInput.placeholder = '金额';
        amountInput.value = (amount !== '' && !isNaN(amount)) ? amount : '';
        
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-item-btn';
        deleteBtn.innerHTML = '✕';
        deleteBtn.onclick = (e) => {
            e.stopPropagation();
            deleteExpenseItem(day, itemId);
        };
        
        const updateHandler = () => {
            updateDayExpensesToFirestore(day);
        };
        nameInput.addEventListener('change', updateHandler);
        amountInput.addEventListener('change', updateHandler);
        
        itemDiv.appendChild(nameInput);
        itemDiv.appendChild(amountInput);
        itemDiv.appendChild(deleteBtn);
        return itemDiv;
    }
    
    function addExpenseItem(day, prefillName = '', prefillAmount = '') {
        const container = document.getElementById(`day-${day}-list`);
        if (!container) return;
        const tempId = `item_${Date.now()}_${Math.random().toString(36).substr(2, 8)}`;
        const newItem = createExpenseItemElement(day, tempId, prefillName, prefillAmount);
        container.appendChild(newItem);
        updateDayExpensesToFirestore(day);
    }
    
    function deleteExpenseItem(day, itemId) {
        const container = document.getElementById(`day-${day}-list`);
        if (!container) return;
        const targetItem = container.querySelector(`.expense-item[data-item-id="${itemId}"]`);
        if (targetItem) {
            targetItem.remove();
            updateDayExpensesToFirestore(day);
        }
    }
    
    function collectDayItems(day) {
        const container = document.getElementById(`day-${day}-list`);
        if (!container) return [];
        const items = [];
        const itemDivs = container.querySelectorAll('.expense-item');
        itemDivs.forEach(div => {
            const nameInput = div.querySelector('.expense-name');
            const amountInput = div.querySelector('.expense-amount');
            let name = nameInput ? nameInput.value.trim() : '';
            let amount = amountInput ? parseFloat(amountInput.value) : 0;
            if (isNaN(amount)) amount = 0;
            if (name === '' && amount === 0) return;
            if (name === '') name = '未命名';
            items.push({ name, amount });
        });
        return items;
    }
    
    function updateDayExpensesToFirestore(day) {
        if (!firebaseInitialized || !db) {
            recalcAllTotals();
            return;
        }
        const items = collectDayItems(day);
        const docId = getDocId(currentYear, currentMonth);
        const docRef = db.collection('monthly_expenses').doc(docId);
        const updatePath = `days.${day}`;
        const updateData = {};
        updateData[updatePath] = items;
        docRef.set(updateData, { merge: true })
            .then(() => recalcAllTotals())
            .catch(err => console.error("更新失败:", err));
    }
    
    function renderDayFromData(day, itemsArray) {
        const container = document.getElementById(`day-${day}-list`);
        if (!container) return;
        container.innerHTML = '';
        if (!itemsArray || !Array.isArray(itemsArray)) return;
        itemsArray.forEach((item, idx) => {
            const itemId = `item_${day}_${idx}_${Date.now()}_${Math.random()}`;
            const itemEl = createExpenseItemElement(day, itemId, item.name || '', item.amount !== undefined ? item.amount : '');
            container.appendChild(itemEl);
        });
    }
    
    function updateAllDaysFromData(daysMap) {
        if (isRendering) return;
        isRendering = true;
        try {
            for (let day in daysMap) {
                if (daysMap.hasOwnProperty(day)) {
                    renderDayFromData(parseInt(day), daysMap[day]);
                }
            }
            const allDayContainers = document.querySelectorAll('.day-card');
            allDayContainers.forEach(card => {
                const dayAttr = card.getAttribute('data-day');
                if (dayAttr && !daysMap[dayAttr]) {
                    const listDiv = card.querySelector('.expense-list');
                    if (listDiv) listDiv.innerHTML = '';
                }
            });
            recalcAllTotals();
        } finally {
            isRendering = false;
        }
    }
    
    // 核心计算：总消费、周合计、日合计
    function recalcAllTotals() {
        const rows = document.querySelectorAll('#tableBody tr');
        let grandTotal = 0;
        
        for (let r = 0; r < rows.length; r++) {
            const row = rows[r];
            const tds = row.querySelectorAll('td:not(:last-child)');
            let weekSum = 0;
            tds.forEach(td => {
                const dayCard = td.querySelector('.day-card');
                if (dayCard) {
                    const dayNum = dayCard.getAttribute('data-day');
                    const amounts = dayCard.querySelectorAll('.expense-amount');
                    let dayTotal = 0;
                    amounts.forEach(amountInput => {
                        let val = parseFloat(amountInput.value);
                        if (!isNaN(val)) dayTotal += val;
                    });
                    weekSum += dayTotal;
                    grandTotal += dayTotal;
                    
                    // 更新日合计显示
                    const dayTotalEl = document.getElementById(`day-total-${dayNum}`);
                    if (dayTotalEl) {
                        dayTotalEl.innerText = `合计: ${dayTotal.toFixed(2)}`;
                    }
                }
            });
            const weekTotalTd = row.querySelector('td:last-child');
            if (weekTotalTd) {
                weekTotalTd.innerHTML = `<span>${weekSum.toFixed(2)}</span>`;
            }
        }
        
        document.getElementById('totalSpent').innerText = grandTotal.toFixed(2);
        const remaining = totalBudget - grandTotal;
        const remainingEl = document.getElementById('remainingAmount');
        remainingEl.innerText = remaining.toFixed(2);
        if (remaining < 0) {
            remainingEl.classList.add('negative');
        } else {
            remainingEl.classList.remove('negative');
        }
        const percent = totalBudget > 0 ? (grandTotal / totalBudget) * 100 : 0;
        const fillBar = document.getElementById('progressFill');
        if (fillBar) {
            fillBar.style.width = `${Math.min(100, percent)}%`;
            fillBar.style.backgroundColor = percent > 100 ? '#c2412c' : (percent > 85 ? '#e67e22' : '#2c7a4d');
        }
    }
    
    function listenCurrentMonth() {
        if (!firebaseInitialized || !db) return;
        if (currentMonthUnsubscribe) {
            currentMonthUnsubscribe();
            currentMonthUnsubscribe = null;
        }
        const docId = getDocId(currentYear, currentMonth);
        const docRef = db.collection('monthly_expenses').doc(docId);
        setLoading(true);
        currentMonthUnsubscribe = docRef.onSnapshot((docSnap) => {
            setLoading(false);
            if (docSnap.exists) {
                const data = docSnap.data();
                const daysMap = data.days || {};
                updateAllDaysFromData(daysMap);
            } else {
                updateAllDaysFromData({});
            }
        }, (error) => {
            setLoading(false);
            console.error("监听月份出错:", error);
        });
    }
    
    function listenBudget() {
        if (!firebaseInitialized || !db) return;
        if (budgetUnsubscribe) {
            budgetUnsubscribe();
        }
        const budgetRef = db.collection('settings').doc(BUDGET_DOC_ID);
        budgetUnsubscribe = budgetRef.onSnapshot((docSnap) => {
            if (docSnap.exists) {
                const budgetVal = docSnap.data().amount;
                if (typeof budgetVal === 'number' && !isNaN(budgetVal)) {
                    totalBudget = budgetVal;
                    document.getElementById('totalBudgetInput').value = totalBudget;
                    recalcAllTotals();
                }
            } else {
                budgetRef.set({ amount: 4000 }).catch(e=>console.warn);
                totalBudget = 4000;
                document.getElementById('totalBudgetInput').value = 4000;
                recalcAllTotals();
            }
        }, err => console.warn("预算监听错误", err));
    }
    
    function updateBudget(newAmount) {
        if (isNaN(newAmount)) newAmount = 4000;
        totalBudget = newAmount;
        document.getElementById('totalBudgetInput').value = totalBudget;
        recalcAllTotals();
        if (firebaseInitialized && db) {
            db.collection('settings').doc(BUDGET_DOC_ID).set({ amount: totalBudget }, { merge: true }).catch(e=>console.warn);
        }
    }
    
    function setMonth(year, month) {
        if (month < 0) {
            month = 11;
            year -= 1;
        } else if (month > 11) {
            month = 0;
            year += 1;
        }
        currentYear = year;
        currentMonth = month;
        const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        document.getElementById('currentMonthDisplay').innerText = `${currentYear}年 ${monthNames[currentMonth]}`;
        
        buildTableStructure();
        
        if (firebaseInitialized && db) {
            listenCurrentMonth();
        } else {
            updateAllDaysFromData({});
        }
    }
    
    function init() {
        const now = new Date();
        currentYear = now.getFullYear();
        currentMonth = now.getMonth();
        const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        document.getElementById('currentMonthDisplay').innerText = `${currentYear}年 ${monthNames[currentMonth]}`;
        
        buildTableStructure();
        
        if (firebaseInitialized && db) {
            listenBudget();
            listenCurrentMonth();
        } else {
            console.log("离线模式: 数据仅保存在当前浏览器，刷新会丢失。请配置Firebase以启用多人协作和历史记录。");
            document.getElementById('totalBudgetInput').addEventListener('change', (e) => {
                let newVal = parseFloat(e.target.value);
                if (isNaN(newVal)) newVal = 4000;
                totalBudget = newVal;
                recalcAllTotals();
            });
            updateAllDaysFromData({});
        }
        
        const budgetInput = document.getElementById('totalBudgetInput');
        budgetInput.addEventListener('change', (e) => {
            let newVal = parseFloat(e.target.value);
            if (isNaN(newVal)) newVal = 4000;
            updateBudget(newVal);
        });
        
        document.getElementById('prevMonthBtn').addEventListener('click', () => setMonth(currentYear, currentMonth - 1));
        document.getElementById('nextMonthBtn').addEventListener('click', () => setMonth(currentYear, currentMonth + 1));
        
        recalcAllTotals();
    }
    
    init();
</script>
</body>
</html>
