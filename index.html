<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>家庭生活费协同账本 · 月份切换 + 多人实时同步</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', '微软雅黑', 'PingFang SC', Roboto, Arial, sans-serif;
        }

        body {
            background: #f0f2f5;
            margin: 0;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            overflow-x: hidden;
            padding: 20px 24px 32px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 6px 0;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: space-between;
            width: 100%;
        }

        .title-badge {
            background: #eef2ff;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e40af;
            white-space: nowrap;
        }

        .sub {
            color: #475569;
            margin-bottom: 24px;
            border-left: 4px solid #3b82f6;
            padding-left: 14px;
            font-size: 0.95rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .month-picker {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 40px;
            flex-wrap: nowrap;
        }
        .month-picker select {
            padding: 6px 12px;
            border-radius: 24px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 0.9rem;
            min-width: 80px;
        }
        .month-picker button {
            background: #3b82f6;
            border: none;
            color: white;
            border-radius: 24px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .budget-panel {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 24px;
            padding: 20px 28px;
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            color: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
        }

        .budget-item {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(2px);
            border-radius: 20px;
            padding: 12px 22px;
            text-align: center;
            flex: 1;
            min-width: 150px; /* 增大最小宽度，避免预算项挤压 */
            max-width: 220px;
        }

        .budget-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 400;
            opacity: 0.8;
        }

        .budget-amount {
            font-size: 2.3rem;
            font-weight: 800;
            line-height: 1.2;
            margin-top: 6px;
        }

        .remaining {
            background: #10b981;
        }

        .remaining.negative {
            background: #ef4444;
        }

        .reset-btn {
            background: #f97316;
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            white-space: nowrap;
            flex-shrink: 0; /* 防止按钮被挤压 */
        }

        .reset-btn:hover {
            background: #ea580c;
            transform: scale(0.98);
        }

        .expense-table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            background: white;
            width: 100%;
            margin: 0 auto;
        }

        .expense-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            table-layout: fixed; /* 关键：固定表格布局，避免列宽混乱 */
        }

        .expense-table thead tr {
            width: 100%;
            display: table-header-group;
        }

        /* 核心修复：给每列分配合理的固定宽度比例 */
        .expense-table th:nth-child(1) { width: 5%; min-width: 40px; }  /* 展开按钮列 */
        .expense-table th:nth-child(2) { width: 10%; min-width: 60px; } /* 日期列 */
        .expense-table th:nth-child(3) { width: 10%; min-width: 60px; } /* 星期列 */
        .expense-table th:nth-child(4) { width: 15%; min-width: 100px; }/* 当日总消费列 */
        .expense-table th:nth-child(5) { width: 50%; min-width: 200px; }/* 备注列（占主要宽度） */

        /* 表格单元格继承列宽 */
        .expense-table td {
            width: inherit;
            word-wrap: break-word; /* 文字换行，避免溢出 */
        }

        .week-header-row {
            background: #f8fafc;
            border-top: 2px solid #cbd5e1;
            border-bottom: 1px solid #e2e8f0;
        }
        .week-header-row th {
            padding: 12px 12px;
            font-weight: 700;
            color: #0f3b5c;
            background: #f1f5f9;
            text-align: left;
        }

        .daily-main-row {
            cursor: pointer;
            background-color: white;
        }
        .daily-main-row:hover {
            background-color: #fefce8;
        }
        .daily-main-row td {
            padding: 12px 10px;
            border-bottom: 1px solid #ecf3fa;
            vertical-align: middle;
        }
        .expand-icon {
            font-size: 1.2rem;
            display: inline-block;
            width: 24px;
            text-align: center;
            transition: transform 0.2s;
        }
        .expand-icon.open {
            transform: rotate(90deg);
        }
        .daily-total-input {
            width: 100%;
            padding: 6px 8px;
            border-radius: 14px;
            border: 1px solid #cbd5e1;
            background: #f1f5f9;
            font-weight: 500;
            text-align: right;
            pointer-events: none;
            min-width: 80px; /* 保证输入框最小宽度 */
        }

        .details-row {
            background-color: #fefdf6;
            border-bottom: 1px solid #e2e8f0;
        }
        .details-cell {
            padding: 12px 20px 16px 48px;
            background-color: #fefdf6;
        }
        .items-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            table-layout: fixed;
        }
        .items-table th:nth-child(1) { width: 60%; } /* 消费项目列 */
        .items-table th:nth-child(2) { width: 30%; } /* 金额列 */
        .items-table th:nth-child(3) { width: 10%; } /* 删除列 */
        
        .items-table th {
            text-align: left;
            padding: 8px 6px;
            color: #4b5563;
            font-weight: 500;
            border-bottom: 1px dashed #d1d5db;
        }
        .items-table td {
            padding: 6px;
            border-bottom: 1px solid #f0f0e8;
            width: inherit;
        }
        .item-name-input {
            width: 100%;
            padding: 6px 8px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: white;
            min-width: 100px;
        }
        .item-amount-input {
            width: 100%;
            padding: 6px 8px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            text-align: right;
            min-width: 80px;
        }
        .add-item-btn {
            background: #e2e8f0;
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: 8px;
            white-space: nowrap;
        }
        .delete-item-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            padding: 0 6px;
        }
        .weekly-summary-row {
            background: #fef9e3;
            font-weight: 600;
            border-top: 1px solid #fed7aa;
        }
        .weekly-summary-row td {
            padding: 10px 12px;
            background: #fffbeb;
            color: #b45309;
        }

        .footer-note {
            margin-top: 24px;
            text-align: center;
            font-size: 0.8rem;
            color: #5b6e8c;
            background: #f8fafc;
            padding: 12px;
            border-radius: 20px;
            width: 100%;
        }

        .sync-status {
            font-size: 0.8rem;
            background: #eef2ff;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            color: #1e40af;
            white-space: nowrap;
        }

        /* 响应式优化 */
        @media (max-width: 720px) {
            .container { 
                padding: 16px; 
                border-radius: 20px;
            }
            .budget-item { 
                min-width: 120px; 
                padding: 8px 16px; 
                flex: 1 1 calc(50% - 10px); /* 小屏2列布局，避免挤压 */
            }
            .budget-amount { font-size: 1.6rem; }
            .month-picker { 
                flex-wrap: wrap;
                justify-content: center;
                width: 100%;
                margin-top: 8px;
            }
            .reset-btn { padding: 10px 20px; font-size: 0.9rem; }
            
            /* 小屏调整表格列宽比例 */
            .expense-table th:nth-child(1) { width: 8%; }
            .expense-table th:nth-child(2) { width: 12%; }
            .expense-table th:nth-child(3) { width: 12%; }
            .expense-table th:nth-child(4) { width: 18%; }
            .expense-table th:nth-child(5) { width: 50%; }
        }

        /* 极小屏适配 */
        @media (max-width: 480px) {
            .budget-item { flex: 1 1 100%; }
            .month-picker select { min-width: 70px; }
            .month-picker button { padding: 6px 10px; }
            
            /* 极小屏进一步调整列宽 */
            .expense-table th:nth-child(1) { width: 10%; }
            .expense-table th:nth-child(2) { width: 15%; }
            .expense-table th:nth-child(3) { width: 15%; }
            .expense-table th:nth-child(4) { width: 20%; }
            .expense-table th:nth-child(5) { width: 40%; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        📋 家庭生活费协同账本 · 月份切换
        <span class="title-badge">总额 ¥4000 · 云端同步</span>
    </h1>
    <div class="sub">
        <span>🗓️ 按自然周分组 | 点击日期行展开/收起，记录细分消费 | 多人同时编辑自动同步</span>
        <div class="month-picker">
            <select id="yearSelect"></select>
            <select id="monthSelect"></select>
            <button id="goToMonthBtn">切换月份</button>
            <span class="sync-status" id="syncStatus">🔄 连接中...</span>
        </div>
    </div>

    <div class="budget-panel">
        <div class="budget-item">
            <div class="budget-label">💰 总预算</div>
            <div class="budget-amount">¥4,000.00</div>
        </div>
        <div class="budget-item">
            <div class="budget-label">📆 已消费总额</div>
            <div class="budget-amount" id="totalSpentDisplay">¥0.00</div>
        </div>
        <div class="budget-item remaining" id="remainingCard">
            <div class="budget-label">✅ 剩余可用</div>
            <div class="budget-amount" id="remainingAmount">¥4,000.00</div>
        </div>
        <button class="reset-btn" id="resetAllBtn">⟳ 清零所有消费</button>
    </div>

    <div class="expense-table-wrapper">
        <table class="expense-table" id="expenseTable">
            <thead>
                <tr>
                    <th></th>
                    <th>日期</th>
                    <th>星期</th>
                    <th>当日总消费 (¥)</th>
                    <th>备注</th>
                </tr>
            </thead>
            <tbody id="tableBodyContainer"></tbody>
        </table>
    </div>
    <div class="footer-note">
        ✨ 提示：点击日期行展开明细，可添加/删除具体项目（早餐、午餐等），金额自动汇总。所有数据云端存储，多人实时同步。切换月份后自动加载对应月份数据。
    </div>
</div>

<script>
    // ==================== 请替换为您的 Firebase 配置 ====================
    const firebaseConfig = {
        apiKey: "AIzaSyBv8bpOCY4A3mSR5c6W28NhZxa2c7GnVgM",
        authDomain: "family-budget-6195c.firebaseapp.com",
        projectId: "family-budget-6195c",
        storageBucket: "family-budget-6195c.firebasestorage.app",
        messagingSenderId: "1073000744379",
        appId: "1:1073000744379:web:f0151dec6b3564a470f09e"
    };
    // =================================================================

    // 初始化 Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const TOTAL_BUDGET = 4000.00;

    let currentYear = null, currentMonth = null;
    let monthlyData = [];       // 本地数据镜像 { dateStr, items, remark, totalAmount }
    let weeklyGroups = [];
    let expandedRowState = {};  // 展开状态
    let currentDocRef = null;   // Firestore 文档引用
    let unsubListener = null;    // 实时监听取消函数

    // DOM
    const tableBodyContainer = document.getElementById('tableBodyContainer');
    const totalSpentDisplay = document.getElementById('totalSpentDisplay');
    const remainingAmountSpan = document.getElementById('remainingAmount');
    const remainingCard = document.getElementById('remainingCard');
    const resetBtn = document.getElementById('resetAllBtn');
    const syncStatusSpan = document.getElementById('syncStatus');
    const yearSelect = document.getElementById('yearSelect');
    const monthSelect = document.getElementById('monthSelect');
    const goToMonthBtn = document.getElementById('goToMonthBtn');

    // ---------- 辅助函数 ----------
    function getDaysInMonth(year, month) {
        return new Date(year, month + 1, 0).getDate();
    }

    function getChineseWeekday(dateObj) {
        let dayNum = dateObj.getDay();
        if (dayNum === 0) return 7;
        return dayNum;
    }

    // 构建初始月份数据结构（无云端数据时使用）
    function buildEmptyMonthData(year, month) {
        const daysCount = getDaysInMonth(year, month);
        const monthData = [];
        for (let d = 1; d <= daysCount; d++) {
            const dateObj = new Date(year, month, d);
            const weekdayNum = getChineseWeekday(dateObj);
            const weekdayStr = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'][weekdayNum - 1];
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            monthData.push({
                dateStr,
                year, month, day: d,
                weekdayNum, weekdayStr,
                items: [],
                remark: '',
                totalAmount: 0
            });
        }
        return monthData;
    }

    // 从云端数据填充 monthlyData
    function applyCloudData(cloudDocData) {
        if (!cloudDocData) return;
        const daysMap = cloudDocData.days || {};
        monthlyData.forEach(day => {
            const cloudDay = daysMap[day.dateStr];
            if (cloudDay) {
                day.items = cloudDay.items || [];
                day.remark = cloudDay.remark || '';
                // 重新计算总额确保一致
                day.totalAmount = day.items.reduce((sum, it) => sum + (it.amount || 0), 0);
            } else {
                day.items = [];
                day.remark = '';
                day.totalAmount = 0;
            }
        });
    }

    // 将 monthlyData 转换为适合云端存储的格式
    function buildCloudData() {
        const days = {};
        monthlyData.forEach(day => {
            days[day.dateStr] = {
                items: day.items,
                remark: day.remark
            };
        });
        return { days };
    }

    // 写入云端（合并更新）
    async function syncToCloud() {
        if (!currentDocRef) return;
        const cloudData = buildCloudData();
        try {
            await currentDocRef.set(cloudData, { merge: true });
            syncStatusSpan.innerText = '✅ 已同步';
            setTimeout(() => {
                if (syncStatusSpan.innerText === '✅ 已同步') syncStatusSpan.innerText = '☁️ 已连接';
            }, 1500);
        } catch (err) {
            console.error('同步失败:', err);
            syncStatusSpan.innerText = '⚠️ 同步失败';
        }
    }

    // 更新某一天的数据（本地 + 云端）
    async function updateDayAndSync(dayIdx) {
        const day = monthlyData[dayIdx];
        let sum = 0;
        day.items.forEach(item => {
            let amt = parseFloat(item.amount);
            if (isNaN(amt)) amt = 0;
            sum += amt;
        });
        day.totalAmount = sum;
        await syncToCloud();
        updateAllSummaries();
        renderFullTable();
    }

    // 重置所有消费（当前月份）
    async function resetAllExpenses() {
        if (!confirm('确认清零当前月份所有消费记录？此操作会同步到所有成员，无法撤销。')) return;
        monthlyData.forEach(day => {
            day.items = [];
            day.remark = '';
            day.totalAmount = 0;
        });
        expandedRowState = {};
        await syncToCloud();
        renderFullTable();
    }

    // 计算总消费、剩余，更新周合计
    function updateAllSummaries() {
        let totalSpent = 0;
        monthlyData.forEach(day => {
            totalSpent += day.totalAmount;
        });
        const remaining = TOTAL_BUDGET - totalSpent;
        totalSpentDisplay.innerText = `¥${totalSpent.toFixed(2)}`;
        remainingAmountSpan.innerText = `¥${remaining.toFixed(2)}`;
        if (remaining < 0) {
            remainingCard.classList.add('negative');
            remainingCard.style.background = "#ef4444";
        } else {
            remainingCard.classList.remove('negative');
            remainingCard.style.background = "#10b981";
        }

        if (!weeklyGroups.length) return;
        weeklyGroups.forEach((group, idx) => {
            let groupSum = 0;
            group.daysIndices.forEach(dayIdx => {
                groupSum += monthlyData[dayIdx].totalAmount;
            });
            const groupTotalSpan = document.querySelector(`.group-total-${idx}`);
            if (groupTotalSpan) groupTotalSpan.innerText = `¥${groupSum.toFixed(2)}`;
        });
    }

    // 按自然周分组
    function groupByWeek(monthData) {
        const groups = [];
        let currentGroup = null;
        for (let i = 0; i < monthData.length; i++) {
            const day = monthData[i];
            if (!currentGroup || day.weekdayNum === 1) {
                if (currentGroup) groups.push(currentGroup);
                currentGroup = {
                    startIdx: i, endIdx: i, daysIndices: [i],
                    startDate: day.dateStr, endDate: day.dateStr, groupId: groups.length
                };
            } else {
                currentGroup.daysIndices.push(i);
                currentGroup.endIdx = i;
                currentGroup.endDate = day.dateStr;
            }
        }
        if (currentGroup) groups.push(currentGroup);
        return groups;
    }

    // 渲染表格（根据 monthlyData 和 expandedRowState）
    function renderFullTable() {
        if (!monthlyData.length) return;
        weeklyGroups = groupByWeek(monthlyData);
        tableBodyContainer.innerHTML = '';

        weeklyGroups.forEach((group, groupIdx) => {
            const tbody = document.createElement('tbody');
            // 周标题行
            const startDay = monthlyData[group.startIdx];
            const endDay = monthlyData[group.endIdx];
            const titleRow = document.createElement('tr');
            titleRow.className = 'week-header-row';
            const th = document.createElement('th');
            th.colSpan = 5;
            th.innerHTML = `📅 第 ${groupIdx+1} 周  ·  ${startDay.dateStr} 至 ${endDay.dateStr}  (周一~周日)`;
            titleRow.appendChild(th);
            tbody.appendChild(titleRow);

            group.daysIndices.forEach(dayIdx => {
                const day = monthlyData[dayIdx];
                const isExpanded = expandedRowState[day.dateStr] || false;

                const mainRow = document.createElement('tr');
                mainRow.className = 'daily-main-row';
                mainRow.setAttribute('data-date', day.dateStr);
                mainRow.style.cursor = 'pointer';

                const expandCell = document.createElement('td');
                expandCell.style.textAlign = 'center';
                const iconSpan = document.createElement('span');
                iconSpan.className = `expand-icon ${isExpanded ? 'open' : ''}`;
                iconSpan.innerText = isExpanded ? '▼' : '▶';
                expandCell.appendChild(iconSpan);

                const dateCell = document.createElement('td');
                dateCell.innerText = `${day.month+1}/${day.day}`;
                const weekdayCell = document.createElement('td');
                weekdayCell.innerText = day.weekdayStr;
                const totalCell = document.createElement('td');
                const totalInput = document.createElement('input');
                totalInput.type = 'text';
                totalInput.className = 'daily-total-input';
                totalInput.value = `¥${day.totalAmount.toFixed(2)}`;
                totalInput.readOnly = true;
                totalCell.appendChild(totalInput);
                const remarkCell = document.createElement('td');
                const remarkInput = document.createElement('input');
                remarkInput.type = 'text';
                remarkInput.placeholder = '备注';
                remarkInput.value = day.remark || '';
                remarkInput.style.width = '100%';
                remarkInput.style.padding = '6px';
                remarkInput.style.borderRadius = '12px';
                remarkInput.style.border = '1px solid #e2e8f0';
                remarkInput.addEventListener('change', async (e) => {
                    day.remark = e.target.value;
                    await syncToCloud();
                });
                remarkCell.appendChild(remarkInput);

                mainRow.appendChild(expandCell);
                mainRow.appendChild(dateCell);
                mainRow.appendChild(weekdayCell);
                mainRow.appendChild(totalCell);
                mainRow.appendChild(remarkCell);

                mainRow.addEventListener('click', (e) => {
                    if (e.target.tagName === 'INPUT' && e.target !== remarkInput) return;
                    expandedRowState[day.dateStr] = !expandedRowState[day.dateStr];
                    renderFullTable();
                });

                tbody.appendChild(mainRow);

                if (isExpanded) {
                    const detailRow = document.createElement('tr');
                    detailRow.className = 'details-row';
                    const detailCell = document.createElement('td');
                    detailCell.colSpan = 5;
                    detailCell.className = 'details-cell';

                    const itemsDiv = document.createElement('div');
                    const itemsTable = document.createElement('table');
                    itemsTable.className = 'items-table';
                    itemsTable.innerHTML = `
                        <thead><tr><th>消费项目</th><th>金额 (¥)</th><th></th></tr></thead>
                        <tbody id="items-tbody-${day.dateStr}"></tbody>
                    `;
                    const tbodyItems = itemsTable.querySelector(`tbody#items-tbody-${day.dateStr}`);

                    day.items.forEach((item, idx) => {
                        const row = document.createElement('tr');
                        const nameCell = document.createElement('td');
                        const nameInput = document.createElement('input');
                        nameInput.type = 'text';
                        nameInput.value = item.name || '';
                        nameInput.placeholder = '例如: 早餐';
                        nameInput.className = 'item-name-input';
                        nameInput.addEventListener('change', async () => {
                            day.items[idx].name = nameInput.value;
                            await updateDayAndSync(dayIdx);
                        });
                        nameCell.appendChild(nameInput);

                        const amountCell = document.createElement('td');
                        const amountInput = document.createElement('input');
                        amountInput.type = 'number';
                        amountInput.step = '0.01';
                        amountInput.value = item.amount ? item.amount.toFixed(2) : '';
                        amountInput.placeholder = '0.00';
                        amountInput.className = 'item-amount-input';
                        amountInput.addEventListener('change', async () => {
                            let val = parseFloat(amountInput.value);
                            if (isNaN(val)) val = 0;
                            day.items[idx].amount = val;
                            await updateDayAndSync(dayIdx);
                        });
                        amountCell.appendChild(amountInput);

                        const delCell = document.createElement('td');
                        const delBtn = document.createElement('button');
                        delBtn.innerText = '✖';
                        delBtn.className = 'delete-item-btn';
                        delBtn.addEventListener('click', async () => {
                            day.items.splice(idx, 1);
                            await updateDayAndSync(dayIdx);
                        });
                        delCell.appendChild(delBtn);

                        row.appendChild(nameCell);
                        row.appendChild(amountCell);
                        row.appendChild(delCell);
                        tbodyItems.appendChild(row);
                    });

                    const addBtn = document.createElement('button');
                    addBtn.innerText = '+ 添加消费项目';
                    addBtn.className = 'add-item-btn';
                    addBtn.addEventListener('click', async () => {
                        day.items.push({ name: '', amount: 0 });
                        await updateDayAndSync(dayIdx);
                    });

                    itemsDiv.appendChild(itemsTable);
                    itemsDiv.appendChild(addBtn);
                    detailCell.appendChild(itemsDiv);
                    detailRow.appendChild(detailCell);
                    tbody.appendChild(detailRow);
                }
            });

            const summaryRow = document.createElement('tr');
            summaryRow.className = 'weekly-summary-row';
            const sumLabelCell = document.createElement('td');
            sumLabelCell.colSpan = 4;
            sumLabelCell.style.textAlign = 'right';
            sumLabelCell.style.fontWeight = '600';
            sumLabelCell.innerText = '📌 本周合计：';
            const sumAmountCell = document.createElement('td');
            sumAmountCell.style.fontWeight = '800';
            sumAmountCell.style.color = '#c2410c';
            const groupTotalSpan = document.createElement('span');
            groupTotalSpan.className = `group-total-${groupIdx}`;
            let groupSum = 0;
            group.daysIndices.forEach(di => groupSum += monthlyData[di].totalAmount);
            groupTotalSpan.innerText = `¥${groupSum.toFixed(2)}`;
            sumAmountCell.appendChild(groupTotalSpan);
            summaryRow.appendChild(sumLabelCell);
            summaryRow.appendChild(sumAmountCell);
            tbody.appendChild(summaryRow);

            tableBodyContainer.appendChild(tbody);
        });
        updateAllSummaries();
    }

    // 切换月份：清除旧监听，重新构建数据和监听
    async function switchToMonth(year, month) {
        // 取消之前的监听
        if (unsubListener) {
            unsubListener();
            unsubListener = null;
        }
        // 更新当前年月
        currentYear = year;
        currentMonth = month;
        // 清空展开状态（避免跨月遗留）
        expandedRowState = {};
        // 重新构建本地空数据
        monthlyData = buildEmptyMonthData(year, month);
        // 设置 Firestore 文档引用
        const docId = `${year}_${month}`;
        currentDocRef = db.collection('budgets').doc(docId);
        
        syncStatusSpan.innerText = '🔄 加载中...';
        tableBodyContainer.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;">加载云端数据中...</td></tr>';
        
        // 实时监听
        unsubListener = currentDocRef.onSnapshot(async (docSnapshot) => {
            if (docSnapshot.exists) {
                const cloudData = docSnapshot.data();
                applyCloudData(cloudData);
                syncStatusSpan.innerText = '☁️ 已连接';
            } else {
                // 文档不存在，创建默认空数据
                await currentDocRef.set(buildCloudData());
                syncStatusSpan.innerText = '☁️ 已连接';
            }
            renderFullTable();
        }, (error) => {
            console.error('监听失败:', error);
            syncStatusSpan.innerText = '⚠️ 连接失败，请刷新重试';
        });
    }

    // 初始化年份/月份下拉框
    function initMonthPicker() {
        const now = new Date();
        const currentYear = now.getFullYear();
        // 填充年份：当前年份前后各5年
        for (let y = currentYear - 5; y <= currentYear + 5; y++) {
            const option = document.createElement('option');
            option.value = y;
            option.textContent = y;
            yearSelect.appendChild(option);
        }
        yearSelect.value = currentYear;
        
        for (let m = 1; m <= 12; m++) {
            const option = document.createElement('option');
            option.value = m;
            option.textContent = `${m}月`;
            monthSelect.appendChild(option);
        }
        monthSelect.value = now.getMonth() + 1;
    }

    // 页面初始化
    async function init() {
        initMonthPicker();
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        await switchToMonth(year, month);
    }

    // 切换按钮事件
    goToMonthBtn.addEventListener('click', async () => {
        const year = parseInt(yearSelect.value, 10);
        const month = parseInt(monthSelect.value, 10) - 1; // 转为0-index
        await switchToMonth(year, month);
    });

    resetBtn.addEventListener('click', resetAllExpenses);

    init();
</script>
