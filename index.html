<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>生活费统计表</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            background: #eef2f9;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
            border-bottom: 2px solid #e9edf2;
            padding-bottom: 20px;
        }

        .budget-section {
            display: flex;
            align-items: baseline;
            gap: 12px;
            background: #f1f5f9;
            padding: 8px 24px;
            border-radius: 60px;
        }

        .budget-section label {
            font-weight: 700;
            color: #1e293b;
        }

        .budget-input {
            font-size: 1.3rem;
            font-weight: 700;
            width: 130px;
            padding: 6px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            text-align: center;
            background: white;
        }

        .budget-input:focus {
            outline: none;
            border-color: #2c7a4d;
            box-shadow: 0 0 0 3px rgba(44,122,77,0.2);
        }

        .month-control {
            display: flex;
            align-items: center;
            gap: 18px;
            background: #ffffff;
            padding: 5px 20px;
            border-radius: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .month-btn {
            background: #eef2ff;
            border: none;
            font-size: 1.6rem;
            font-weight: 600;
            width: 42px;
            height: 42px;
            border-radius: 42px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .month-btn:hover {
            background: #d9e2ef;
            transform: scale(0.96);
        }

        .current-month {
            font-size: 1.5rem;
            font-weight: 700;
            min-width: 200px;
            text-align: center;
            letter-spacing: 1px;
            color: #0f172a;
        }

        .stats {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            margin-bottom: 28px;
            background: linear-gradient(120deg, #f8fafc 0%, #ffffff 100%);
            padding: 18px 24px;
            border-radius: 28px;
        }

        .stat-card {
            flex: 1;
            background: white;
            border-radius: 24px;
            padding: 12px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #eef2f6;
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5b6e8c;
            font-weight: 500;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: #1e293b;
            line-height: 1.2;
        }

        .remaining {
            color: #2c7a4d;
        }
        .remaining.negative {
            color: #c2412c;
        }
        .progress-bar-bg {
            margin-top: 10px;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #2c7a4d;
            border-radius: 10px;
            transition: width 0.2s;
        }

        .table-wrapper {
            overflow-x: visible;
            border-radius: 24px;
            border: 1px solid #edf2f7;
            background: white;
            position: relative;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            font-size: 0.9rem;
            color: #2c7a4d;
            backdrop-filter: blur(2px);
            border-radius: 24px;
        }

        .expense-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            table-layout: fixed;
        }

        .expense-table th {
            background: #f1f6fd;
            padding: 12px 4px;
            font-weight: 700;
            color: #1f3a4b;
            border-bottom: 1px solid #e2e8f0;
            text-align: center;
            width: 12.5%;
        }

        .expense-table td {
            border: 1px solid #ecf3f9;
            padding: 6px 3px;
            vertical-align: top;
            background: white;
        }

        .day-card {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }
        .day-header {
            font-weight: 700;
            font-size: 0.85rem;
            background: #eef2ff;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            margin: 0 auto 4px auto;
            color: #1f2937;
        }
        .expense-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 4px;
            max-height: 180px;
            overflow-y: auto;
        }
        .expense-item {
            display: flex;
            align-items: center;
            gap: 3px;
            background: #f9fafc;
            padding: 2px 4px;
            border-radius: 16px;
            border: 1px solid #e9edf2;
            flex-wrap: wrap;
        }
        .expense-name {
            flex: 2;
            min-width: 45px;
            padding: 4px 4px;
            border: 1px solid #cfdee9;
            border-radius: 16px;
            font-size: 0.7rem;
            background: white;
        }
        .expense-amount {
            width: 58px;
            padding: 4px 4px;
            border: 1px solid #cfdee9;
            border-radius: 16px;
            font-size: 0.7rem;
            text-align: center;
            background: white;
        }
        .delete-item-btn {
            background: #fee2e2;
            border: none;
            border-radius: 20px;
            width: 20px;
            height: 20px;
            font-size: 0.6rem;
            font-weight: bold;
            cursor: pointer;
            color: #b91c1c;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .delete-item-btn:hover {
            background: #fecaca;
        }
        .add-item-btn {
            background: #e6f0fa;
            border: none;
            border-radius: 30px;
            padding: 4px 6px;
            font-size: 0.65rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            color: #2c5f8a;
            margin-top: 2px;
        }
        .add-item-btn:hover {
            background: #d4e2f5;
        }
        .day-total {
            background: #f0fdf4;
            border-radius: 20px;
            padding: 4px 6px;
            font-size: 0.7rem;
            font-weight: 600;
            text-align: center;
            color: #15803d;
            border: 1px solid #bbf7d0;
            margin-top: 4px;
        }
        .empty-cell {
            background: #fafdff;
            opacity: 0.55;
            text-align: center;
            vertical-align: middle;
        }
        .week-total {
            background: #fef9e3;
            font-weight: 800;
            color: #b45309;
            text-align: center;
            vertical-align: middle;
            font-size: 0.85rem;
        }
        .week-total span {
            background: #fff1e6;
            padding: 4px 8px;
            border-radius: 30px;
            display: inline-block;
        }
        .footer-note {
            margin-top: 24px;
            text-align: center;
            font-size: 0.7rem;
            color: #5c6f87;
            border-top: 1px solid #ecf3f9;
            padding-top: 18px;
        }

        @media (max-width: 900px) {
            .expense-table {
                font-size: 0.7rem;
            }
            .expense-name {
                min-width: 38px;
                font-size: 0.65rem;
            }
            .expense-amount {
                width: 50px;
                font-size: 0.65rem;
            }
            .day-total {
                font-size: 0.65rem;
                padding: 3px 4px;
            }
        }

        @media (max-width: 700px) {
            .expense-name {
                min-width: 32px;
            }
            .expense-amount {
                width: 45px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="budget-section">
            <label>💰 月预算总额</label>
            <input type="number" id="totalBudgetInput" class="budget-input" step="100" value="4000">
        </div>
        <div class="month-control">
            <button id="prevMonthBtn" class="month-btn">◀</button>
            <div id="currentMonthDisplay" class="current-month">加载中...</div>
            <button id="nextMonthBtn" class="month-btn">▶</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">📆 本月总消费</div>
            <div class="stat-value" id="totalSpent">0.00</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">💎 剩余生活费</div>
            <div class="stat-value remaining" id="remainingAmount">4000.00</div>
            <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
        </div>
    </div>

    <div class="table-wrapper" id="tableWrapper">
        <div class="loading-overlay" id="loadingOverlay" style="display: none;">📡 加载数据中...</div>
        <table class="expense-table" id="expenseTable">
            <thead>
                <tr><th>周一</th><th>周二</th><th>周三</th><th>周四</th><th>周五</th><th>周六</th><th>周日</th><th>📊 周合计</th> </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div class="footer-note">
        ✨ 数据实时云端同步（Firebase），每月消费独立保存，切换月份不会丢失历史记录。<br>
        📝 每天可自由添加消费项，点击“+ 添加”增加条目，每日底部显示本日合计。输入后自动保存，不会丢失。
    </div>
</div>

<script>
    // ----------------------------- Firebase 配置（请替换为您的项目配置）-----------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyBv8bpOCY4A3mSR5c6W28NhZxa2c7GnVgM",
        authDomain: "family-budget-6195c.firebaseapp.com",
        projectId: "family-budget-6195c",
        storageBucket: "family-budget-6195c.firebasestorage.app",
        messagingSenderId: "1073000744379",
        appId: "1:1073000744379:web:f0151dec6b3564a470f09e"
    };
    let db = null;
    let firebaseInitialized = false;
    try {
        if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            firebaseInitialized = true;
            console.log("✅ Firebase 已连接，历史记录云端保存");
        } else {
            console.warn("⚠️ 未填写 Firebase 配置，数据将仅保存在内存中（刷新会丢失）");
        }
    } catch(e) {
        console.warn("Firebase 初始化失败", e);
    }

    // ---------- 全局变量 ----------
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    let totalBudget = 4000;
    let currentMonthUnsubscribe = null;
    let budgetUnsubscribe = null;
    // 存储当前月份各天的条目数据，用于对比更新（避免全量重绘）
    let localDaysData = {};

    function getDocId(year, month) {
        const m = (month + 1).toString().padStart(2, '0');
        return `${year}_${m}`;
    }
    const BUDGET_DOC_ID = "global_budget";

    function setLoading(show) {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) overlay.style.display = show ? 'flex' : 'none';
    }

    // 生成唯一ID
    function generateId() {
        return `item_${Date.now()}_${Math.random().toString(36).substr(2, 8)}`;
    }

    // 创建单个条目的DOM元素，绑定事件
    function createExpenseItemElement(day, itemId, name, amount, isNew = false) {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'expense-item';
        itemDiv.setAttribute('data-item-id', itemId);
        
        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.className = 'expense-name';
        nameInput.placeholder = '项目';
        nameInput.value = name || '';
        
        const amountInput = document.createElement('input');
        amountInput.type = 'number';
        amountInput.step = '0.01';
        amountInput.className = 'expense-amount';
        amountInput.placeholder = '金额';
        amountInput.value = (amount !== undefined && amount !== null && !isNaN(amount) && amount !== 0) ? amount : '';
        
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-item-btn';
        deleteBtn.innerHTML = '✕';
        
        // 保存函数
        const saveItem = () => {
            const newName = nameInput.value.trim();
            const newAmount = parseFloat(amountInput.value);
            const finalAmount = isNaN(newAmount) ? 0 : newAmount;
            const finalName = newName === '' ? '未命名' : newName;
            
            // 更新本地缓存
            if (!localDaysData[day]) localDaysData[day] = [];
            const existingIndex = localDaysData[day].findIndex(item => item.id === itemId);
            if (existingIndex !== -1) {
                localDaysData[day][existingIndex] = { id: itemId, name: finalName, amount: finalAmount };
            } else {
                localDaysData[day].push({ id: itemId, name: finalName, amount: finalAmount });
            }
            // 保存到云端
            saveDayToCloud(day);
            // 更新日合计显示
            updateDayTotal(day);
            // 重新计算总合计和周合计
            recalcAllTotals();
        };
        
        nameInput.addEventListener('change', saveItem);
        amountInput.addEventListener('change', saveItem);
        deleteBtn.onclick = (e) => {
            e.stopPropagation();
            // 从本地缓存删除
            if (localDaysData[day]) {
                localDaysData[day] = localDaysData[day].filter(item => item.id !== itemId);
                saveDayToCloud(day);
            }
            itemDiv.remove();
            updateDayTotal(day);
            recalcAllTotals();
        };
        
        itemDiv.appendChild(nameInput);
        itemDiv.appendChild(amountInput);
        itemDiv.appendChild(deleteBtn);
        return itemDiv;
    }
    
    // 保存某一天的数据到Firestore（只保存该天）
    function saveDayToCloud(day) {
        if (!firebaseInitialized || !db) {
            recalcAllTotals();
            return;
        }
        const items = (localDaysData[day] || []).map(item => ({
            name: item.name,
            amount: item.amount
        }));
        const docId = getDocId(currentYear, currentMonth);
        const docRef = db.collection('monthly_expenses').doc(docId);
        const updatePath = `days.${day}`;
        const updateData = {};
        updateData[updatePath] = items;
        docRef.set(updateData, { merge: true })
            .catch(err => console.error("保存失败:", err));
    }
    
    // 更新某一天的日合计显示
    function updateDayTotal(day) {
        const dayTotalEl = document.getElementById(`day-total-${day}`);
        if (dayTotalEl) {
            let total = 0;
            const items = localDaysData[day] || [];
            items.forEach(item => { total += item.amount; });
            dayTotalEl.innerText = `合计: ${total.toFixed(2)}`;
        }
    }
    
    // 重新计算所有周合计和总消费（基于localDaysData）
    function recalcAllTotals() {
        const rows = document.querySelectorAll('#tableBody tr');
        let grandTotal = 0;
        
        for (let r = 0; r < rows.length; r++) {
            const row = rows[r];
            const tds = row.querySelectorAll('td:not(:last-child)');
            let weekSum = 0;
            tds.forEach(td => {
                const dayCard = td.querySelector('.day-card');
                if (dayCard) {
                    const dayNum = parseInt(dayCard.getAttribute('data-day'));
                    let dayTotal = 0;
                    const items = localDaysData[dayNum] || [];
                    items.forEach(item => { dayTotal += item.amount; });
                    weekSum += dayTotal;
                    grandTotal += dayTotal;
                }
            });
            const weekTotalTd = row.querySelector('td:last-child');
            if (weekTotalTd) {
                weekTotalTd.innerHTML = `<span>${weekSum.toFixed(2)}</span>`;
            }
        }
        
        document.getElementById('totalSpent').innerText = grandTotal.toFixed(2);
        const remaining = totalBudget - grandTotal;
        const remainingEl = document.getElementById('remainingAmount');
        remainingEl.innerText = remaining.toFixed(2);
        if (remaining < 0) {
            remainingEl.classList.add('negative');
        } else {
            remainingEl.classList.remove('negative');
        }
        const percent = totalBudget > 0 ? (grandTotal / totalBudget) * 100 : 0;
        const fillBar = document.getElementById('progressFill');
        if (fillBar) {
            fillBar.style.width = `${Math.min(100, percent)}%`;
            fillBar.style.backgroundColor = percent > 100 ? '#c2412c' : (percent > 85 ? '#e67e22' : '#2c7a4d');
        }
    }
    
    // 添加新条目（在指定天）
    function addExpenseItem(day) {
        const container = document.getElementById(`day-${day}-list`);
        if (!container) return;
        const newId = generateId();
        const newItem = createExpenseItemElement(day, newId, '', 0, true);
        container.appendChild(newItem);
        // 初始化本地缓存
        if (!localDaysData[day]) localDaysData[day] = [];
        localDaysData[day].push({ id: newId, name: '未命名', amount: 0 });
        // 保存（触发云端同步）
        saveDayToCloud(day);
        updateDayTotal(day);
        recalcAllTotals();
    }
    
    // 根据云端数据更新某一天的列表（智能同步，避免覆盖用户正在输入的内容）
    function syncDayFromCloud(day, cloudItems) {
        // 如果该天没有本地缓存，初始化
        if (!localDaysData[day]) {
            localDaysData[day] = [];
        }
        // 将云端数据转换为带ID的格式（如果云端没有ID，我们生成ID）
        const cloudMap = new Map();
        cloudItems.forEach((item, idx) => {
            // 为每个云端条目生成稳定的ID（基于内容哈希，避免重复添加）
            let existingId = null;
            // 先尝试匹配本地已存在的相同内容条目
            const existing = localDaysData[day].find(local => local.name === item.name && Math.abs(local.amount - item.amount) < 0.01);
            if (existing) {
                existingId = existing.id;
            } else {
                existingId = generateId();
            }
            cloudMap.set(existingId, { id: existingId, name: item.name, amount: item.amount });
        });
        
        // 找出需要删除的本地条目（不在云端中）
        const toDelete = localDaysData[day].filter(local => !cloudMap.has(local.id));
        // 找出需要新增的云端条目
        const toAdd = Array.from(cloudMap.values()).filter(cloud => !localDaysData[day].some(local => local.id === cloud.id));
        // 找出需要更新的（内容变化）
        const toUpdate = Array.from(cloudMap.values()).filter(cloud => {
            const local = localDaysData[day].find(l => l.id === cloud.id);
            return local && (local.name !== cloud.name || Math.abs(local.amount - cloud.amount) > 0.01);
        });
        
        // 执行删除
        toDelete.forEach(del => {
            const itemEl = document.querySelector(`.day-card[data-day='${day}'] .expense-item[data-item-id='${del.id}']`);
            if (itemEl) itemEl.remove();
        });
        // 执行新增
        const container = document.getElementById(`day-${day}-list`);
        toAdd.forEach(add => {
            const newItem = createExpenseItemElement(day, add.id, add.name, add.amount);
            container.appendChild(newItem);
        });
        // 执行更新
        toUpdate.forEach(up => {
            const itemEl = container.querySelector(`.expense-item[data-item-id='${up.id}']`);
            if (itemEl) {
                const nameInput = itemEl.querySelector('.expense-name');
                const amountInput = itemEl.querySelector('.expense-amount');
                if (nameInput) nameInput.value = up.name;
                if (amountInput) amountInput.value = up.amount;
            }
        });
        
        // 更新本地缓存
        localDaysData[day] = Array.from(cloudMap.values());
        updateDayTotal(day);
        recalcAllTotals();
    }
    
    // 完整更新所有天（当切换月份或首次加载时）
    function fullUpdateFromCloud(daysMap) {
        for (let day in daysMap) {
            if (daysMap.hasOwnProperty(day)) {
                syncDayFromCloud(parseInt(day), daysMap[day]);
            }
        }
        // 对于没有数据的天，清空列表
        const allDayCards = document.querySelectorAll('.day-card');
        allDayCards.forEach(card => {
            const dayNum = parseInt(card.getAttribute('data-day'));
            if (!daysMap[dayNum]) {
                const container = document.getElementById(`day-${dayNum}-list`);
                if (container) container.innerHTML = '';
                if (localDaysData[dayNum]) delete localDaysData[dayNum];
                updateDayTotal(dayNum);
            }
        });
        recalcAllTotals();
    }
    
    // 监听当前月份
    function listenCurrentMonth() {
        if (!firebaseInitialized || !db) return;
        if (currentMonthUnsubscribe) {
            currentMonthUnsubscribe();
            currentMonthUnsubscribe = null;
        }
        const docId = getDocId(currentYear, currentMonth);
        const docRef = db.collection('monthly_expenses').doc(docId);
        setLoading(true);
        currentMonthUnsubscribe = docRef.onSnapshot((docSnap) => {
            setLoading(false);
            if (docSnap.exists) {
                const data = docSnap.data();
                const daysMap = data.days || {};
                fullUpdateFromCloud(daysMap);
            } else {
                // 清空所有数据
                const allDayCards = document.querySelectorAll('.day-card');
                allDayCards.forEach(card => {
                    const dayNum = parseInt(card.getAttribute('data-day'));
                    const container = document.getElementById(`day-${dayNum}-list`);
                    if (container) container.innerHTML = '';
                    if (localDaysData[dayNum]) delete localDaysData[dayNum];
                    updateDayTotal(dayNum);
                });
                recalcAllTotals();
            }
        }, (error) => {
            setLoading(false);
            console.error("监听月份出错:", error);
        });
    }
    
    // 监听预算
    function listenBudget() {
        if (!firebaseInitialized || !db) return;
        if (budgetUnsubscribe) {
            budgetUnsubscribe();
        }
        const budgetRef = db.collection('settings').doc(BUDGET_DOC_ID);
        budgetUnsubscribe = budgetRef.onSnapshot((docSnap) => {
            if (docSnap.exists) {
                const budgetVal = docSnap.data().amount;
                if (typeof budgetVal === 'number' && !isNaN(budgetVal)) {
                    totalBudget = budgetVal;
                    document.getElementById('totalBudgetInput').value = totalBudget;
                    recalcAllTotals();
                }
            } else {
                budgetRef.set({ amount: 4000 }).catch(e=>console.warn);
                totalBudget = 4000;
                document.getElementById('totalBudgetInput').value = 4000;
                recalcAllTotals();
            }
        }, err => console.warn("预算监听错误", err));
    }
    
    function updateBudget(newAmount) {
        if (isNaN(newAmount)) newAmount = 4000;
        totalBudget = newAmount;
        document.getElementById('totalBudgetInput').value = totalBudget;
        recalcAllTotals();
        if (firebaseInitialized && db) {
            db.collection('settings').doc(BUDGET_DOC_ID).set({ amount: totalBudget }, { merge: true }).catch(e=>console.warn);
        }
    }
    
    // 构建表格骨架（不含数据）
    function buildTableStructure() {
        const year = currentYear;
        const month = currentMonth;
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const firstDayJS = new Date(year, month, 1).getDay();
        let firstMondayOffset = (firstDayJS === 0 ? 6 : firstDayJS - 1);
        
        const weeks = [];
        let currentDay = 1;
        for (let row = 0; row < 6; row++) {
            const week = [];
            let hasDays = false;
            for (let col = 0; col < 7; col++) {
                if ((row === 0 && col < firstMondayOffset) || currentDay > daysInMonth) {
                    week.push({ day: null, valid: false });
                } else {
                    if (currentDay <= daysInMonth) {
                        week.push({ day: currentDay, valid: true });
                        hasDays = true;
                        currentDay++;
                    } else {
                        week.push({ day: null, valid: false });
                    }
                }
            }
            if (hasDays || week.some(c => c.day !== null)) weeks.push(week);
            if (currentDay > daysInMonth) break;
        }

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        for (let w = 0; w < weeks.length; w++) {
            const weekCells = weeks[w];
            const tr = document.createElement('tr');
            for (let i = 0; i < 7; i++) {
                const cellData = weekCells[i];
                const td = document.createElement('td');
                if (!cellData || !cellData.valid) {
                    td.className = 'empty-cell';
                    td.innerHTML = '<div style="padding: 12px 0; color:#a0b3cc;">—</div>';
                } else {
                    const dayNum = cellData.day;
                    const dayCard = document.createElement('div');
                    dayCard.className = 'day-card';
                    dayCard.setAttribute('data-day', dayNum);
                    
                    const dayHeader = document.createElement('div');
                    dayHeader.className = 'day-header';
                    dayHeader.innerText = dayNum;
                    dayCard.appendChild(dayHeader);
                    
                    const expenseListDiv = document.createElement('div');
                    expenseListDiv.className = 'expense-list';
                    expenseListDiv.id = `day-${dayNum}-list`;
                    dayCard.appendChild(expenseListDiv);
                    
                    const addBtn = document.createElement('button');
                    addBtn.className = 'add-item-btn';
                    addBtn.innerHTML = '+ 添加';
                    addBtn.onclick = (e) => {
                        e.stopPropagation();
                        addExpenseItem(dayNum);
                    };
                    dayCard.appendChild(addBtn);
                    
                    const dayTotalDiv = document.createElement('div');
                    dayTotalDiv.className = 'day-total';
                    dayTotalDiv.id = `day-total-${dayNum}`;
                    dayTotalDiv.innerText = '合计: 0.00';
                    dayCard.appendChild(dayTotalDiv);
                    
                    td.appendChild(dayCard);
                }
                tr.appendChild(td);
            }
            const weekTotalTd = document.createElement('td');
            weekTotalTd.className = 'week-total';
            weekTotalTd.innerHTML = `<span>0.00</span>`;
            tr.appendChild(weekTotalTd);
            tbody.appendChild(tr);
        }
    }
    
    function setMonth(year, month) {
        if (month < 0) {
            month = 11;
            year -= 1;
        } else if (month > 11) {
            month = 0;
            year += 1;
        }
        currentYear = year;
        currentMonth = month;
        const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        document.getElementById('currentMonthDisplay').innerText = `${currentYear}年 ${monthNames[currentMonth]}`;
        
        // 重置本地数据
        localDaysData = {};
        buildTableStructure();
        
        if (firebaseInitialized && db) {
            listenCurrentMonth();
        } else {
            fullUpdateFromCloud({});
        }
    }
    
    function init() {
        const now = new Date();
        currentYear = now.getFullYear();
        currentMonth = now.getMonth();
        const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        document.getElementById('currentMonthDisplay').innerText = `${currentYear}年 ${monthNames[currentMonth]}`;
        
        buildTableStructure();
        
        if (firebaseInitialized && db) {
            listenBudget();
            listenCurrentMonth();
        } else {
            console.log("离线模式: 数据仅保存在当前浏览器，刷新会丢失。请配置Firebase以启用多人协作和历史记录。");
            document.getElementById('totalBudgetInput').addEventListener('change', (e) => {
                let newVal = parseFloat(e.target.value);
                if (isNaN(newVal)) newVal = 4000;
                totalBudget = newVal;
                recalcAllTotals();
            });
            fullUpdateFromCloud({});
        }
        
        const budgetInput = document.getElementById('totalBudgetInput');
        budgetInput.addEventListener('change', (e) => {
            let newVal = parseFloat(e.target.value);
            if (isNaN(newVal)) newVal = 4000;
            updateBudget(newVal);
        });
        
        document.getElementById('prevMonthBtn').addEventListener('click', () => setMonth(currentYear, currentMonth - 1));
        document.getElementById('nextMonthBtn').addEventListener('click', () => setMonth(currentYear, currentMonth + 1));
        
        recalcAllTotals();
    }
    
    init();
</script>
</body>
